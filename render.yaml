# Render Blueprint — Git 연결 시 자동 설정 (선택)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: eternal-beam-app
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r backend/requirements-render.txt
    startCommand: bash scripts/render_start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
